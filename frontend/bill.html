<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arbuda Fashion - Invoice Generator">
    <title>Invoice - Arbuda Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="bill.css">
</head>

<body>
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">Arbuda Fashion</a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="admin.html" class="nav-link">Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="bill-container" id="billContainer">
            <!-- Bill content will be populated here -->
            <p style="text-align: center; color: #888;">Loading invoice...</p>
        </div>

        <div class="bill-actions">
            <button class="btn-print" onclick="window.print()">
                <span>🖨️</span> <span class="btn-text">Print Invoice</span>
            </button>
            <button class="btn-back" onclick="window.location.href='admin.html'">
                <span>⬅️</span> Back to Admin
            </button>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2024 Arbuda Fashion. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="bill.js"></script>
</body>

</html>
